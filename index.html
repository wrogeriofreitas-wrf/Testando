<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DashLog · Patrimônio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg1:#0d1420;--bg2:#111b2a;--bg3:#162032;--bg4:#1a2740;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#5a7090;
  --green:#10d9a0;--green2:rgba(16,217,160,0.12);
  --red:#f05252;--red2:rgba(240,82,82,0.12);
  --blue:#3b9eff;--blue2:rgba(59,158,255,0.12);
  --amber:#f0b429;--amber2:rgba(240,180,41,0.12);
  --purple:#a78bfa;--purple2:rgba(167,139,250,0.12);
  --radius:10px;--mono:'IBM Plex Mono',monospace;
  --border:rgba(255,255,255,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg1);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}

.topbar{background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:56px;position:sticky;top:0;z-index:100;gap:16px;}
.topbar-brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:600;}
.topbar-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{padding:8px 16px;border-radius:7px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid transparent;color:var(--text2);transition:all .15s;white-space:nowrap;}
.nav-tab:hover{background:var(--bg3);color:var(--text);}
.nav-tab.active{background:var(--green2);border-color:var(--green);color:var(--green);}
.topbar-meta{font-size:10px;color:var(--text3);font-family:var(--mono);text-align:right;flex-shrink:0;}

.main{max-width:1280px;margin:0 auto;padding:28px 20px;}
.page{display:none;}.page.active{display:block;}

/* AVISO */
.aviso{background:var(--amber2);border:1px solid rgba(240,180,41,0.25);border-radius:var(--radius);
  padding:10px 16px;font-size:11px;color:var(--amber);margin-bottom:24px;font-family:var(--mono);line-height:1.6;}

/* FICHAS */
.fichas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;}
.ficha{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s;}
.ficha:hover{border-color:rgba(16,217,160,0.25);}
.ficha-header{background:var(--bg3);padding:14px 16px;}
.ficha-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.ficha-placa{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--green);letter-spacing:1px;}
.ficha-vlr-tag{font-size:10px;padding:4px 10px;border-radius:5px;font-family:var(--mono);font-weight:600;
  background:var(--green2);color:var(--green);border:1px solid rgba(16,217,160,0.3);white-space:nowrap;}
.ficha-detran{font-size:11px;color:var(--text3);margin-top:2px;}
.ficha-detran span{color:var(--text2);}

.ficha-body{padding:14px 16px;}
.ficha-obs{font-size:11px;color:var(--text2);margin-bottom:14px;line-height:1.6;
  padding:9px 12px;background:var(--bg3);border-radius:7px;border-left:2px solid var(--text3);font-style:italic;}
.ficha-obs-empty{font-size:11px;color:var(--text3);margin-bottom:14px;
  padding:9px 12px;background:var(--bg3);border-radius:7px;border-left:2px dashed var(--bg4);font-style:italic;}

.socios-title{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:10px;}
.socios-list{display:flex;flex-direction:column;gap:8px;}
.socio-row{display:flex;align-items:center;gap:10px;}
.socio-nome{font-size:12px;color:var(--text);min-width:80px;}
.socio-bar-wrap{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.socio-bar{height:100%;border-radius:3px;}
.socio-right{display:flex;flex-direction:column;align-items:flex-end;min-width:110px;}
.socio-pct{font-family:var(--mono);font-size:11px;font-weight:700;line-height:1.3;}
.socio-val{font-family:var(--mono);font-size:10px;color:var(--text3);line-height:1.3;}

.ficha-diretriz{margin-top:12px;padding:10px 12px;background:var(--bg3);border-radius:7px;
  border-left:2px solid var(--purple);font-size:10px;color:var(--text2);line-height:1.7;}
.diretriz-label{font-size:9px;color:var(--purple);font-family:var(--mono);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.ficha-diretriz-outros{margin-top:6px;padding:10px 12px;background:var(--bg3);border-radius:7px;
  border-left:2px solid var(--bg4);font-size:10px;color:var(--text3);line-height:1.7;}
.diretriz-label-outros{font-size:9px;color:var(--text3);font-family:var(--mono);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}

/* QUADRO TOTAL */
.total-section{margin-top:32px;}
.total-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;
  padding-bottom:10px;border-bottom:1px solid var(--border);}
.total-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.total-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.total-rank{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:4px;}
.total-nome{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
.total-val{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--green);}
.total-bar-wrap{height:4px;background:var(--bg4);border-radius:3px;margin-top:10px;overflow:hidden;}
.total-bar{height:100%;border-radius:3px;background:var(--green);}
.total-detail{font-size:10px;color:var(--text3);margin-top:6px;font-family:var(--mono);}

/* ROE */
.roe-controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px;align-items:center;}
.roe-select{background:var(--bg2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:8px 14px;font-size:12px;font-family:var(--mono);cursor:pointer;}
.roe-select:focus{outline:none;border-color:var(--green);}
.roe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:16px;}
@media(max-width:600px){.roe-grid{grid-template-columns:1fr;}}
.roe-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.roe-card-placa{font-size:18px;font-weight:700;color:var(--green);font-family:var(--mono);letter-spacing:1px;}
.roe-card-sub{font-size:11px;color:var(--text3);margin-bottom:12px;margin-top:2px;}
.roe-chart-wrap{height:200px;margin-bottom:12px;}
.roe-table{width:100%;border-collapse:collapse;font-size:11px;}
.roe-table th{color:var(--text3);font-family:var(--mono);font-size:10px;text-align:left;
  padding:5px 8px;border-bottom:1px solid var(--border);}
.roe-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);font-family:var(--mono);}
.roe-table tr:hover td{background:var(--bg3);}
.pos{color:var(--green);}.neg{color:var(--red);}

.rank-section{margin-top:28px;}
.rank-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;
  padding-bottom:8px;border-bottom:1px solid var(--border);}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.rank-num{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:24px;}
.rank-placa{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);min-width:90px;}
.rank-bar-wrap{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.rank-bar{height:100%;border-radius:3px;}
.rank-pct{font-family:var(--mono);font-size:12px;min-width:72px;text-align:right;font-weight:600;}
.rank-vlr{font-size:11px;color:var(--text3);min-width:110px;text-align:right;font-family:var(--mono);}

#loading{position:fixed;inset:0;background:var(--bg1);display:flex;align-items:center;
  justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.load-spin{animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:var(--mono);font-size:12px;color:var(--text3);}
</style>
</head>
<body>

<div id="loading">
  <svg class="load-spin" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="15" fill="none" stroke="rgba(16,217,160,0.15)" stroke-width="3"/>
    <path d="M18 3 A15 15 0 0 1 33 18" fill="none" stroke="#10d9a0" stroke-width="3" stroke-linecap="round"/>
  </svg>
  <div class="load-txt">Carregando patrimônio...</div>
</div>

<div class="topbar">
  <div class="topbar-brand">
    <svg viewBox="0 0 64 64" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="10" fill="#111b2a"/>
      <rect x="0.5" y="0.5" width="63" height="63" rx="9.5" fill="none" stroke="rgba(16,217,160,0.28)"/>
      <path d="M18 14 L18 50 L32 50 A18 18 0 0 0 32 14 Z" fill="#10d9a0"/>
      <path d="M25 42 L31 36 L37 30 L42 24" fill="none" stroke="#0d1420" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="25" cy="42" r="2.2" fill="#0d1420"/>
      <circle cx="31" cy="36" r="2.2" fill="#0d1420"/>
      <circle cx="37" cy="30" r="2.2" fill="#0d1420"/>
      <circle cx="42" cy="24" r="2.2" fill="#0d1420"/>
    </svg>
    <div>
      <div class="topbar-title">DashLog · Patrimônio</div>
      <div class="topbar-sub">Gestão de Frota · Sociedade & ROE</div>
    </div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="goPage('fichas',this)">📋 Fichas dos Veículos</div>
    <div class="nav-tab" onclick="goPage('roe',this)">📈 ROE por Veículo</div>
  </div>
  <div class="topbar-meta" id="top-meta"></div>
</div>

<div class="main">

  <!-- FICHAS -->
  <div class="page active" id="p-fichas">
    <div class="aviso" id="aviso-legal"></div>
    <div class="fichas-grid" id="fichas-grid"></div>
    <div class="total-section">
      <div class="total-title">💰 Estimativa de Patrimônio por Sócio</div>
      <div class="total-grid" id="total-grid"></div>
    </div>
  </div>

  <!-- ROE -->
  <div class="page" id="p-roe">
    <div class="roe-controls">
      <select class="roe-select" id="roe-ano-sel" onchange="renderROE()">
        <option value="todos">Todos os anos</option>
      </select>
      <select class="roe-select" id="roe-placa-sel" onchange="renderROE()">
        <option value="todas">Todas as placas</option>
      </select>
    </div>
    <div class="roe-grid" id="roe-grid"></div>
    <div class="rank-section">
      <div class="rank-title" id="rank-title">Ranking ROE</div>
      <div id="roe-ranking"></div>
    </div>
  </div>
</div>

<script>
let DATA = null;
const SOCIO_COR = {Rogerio:'#10d9a0',Emerson:'#3b9eff',Denis:'#f0b429',Vanderlei:'#a78bfa',Guilherme:'#FF7C24'};

function goPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='roe') renderROE();
}

function fmtBR(v,abs=false){
  const n = abs ? Math.abs(v) : v;
  return 'R$ '+Math.abs(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function cor(s){return SOCIO_COR[s]||'#94a3b8';}

// ── FICHAS ─────────────────────────────────────────
function renderFichas(){
  document.getElementById('aviso-legal').textContent = '⚠ '+DATA.meta.aviso+' · Ref.: '+DATA.meta.referencia_valores;

  // Descrição 2026 por placa
  const descr2026 = {};
  DATA.historico.filter(r=>r.ano===2026).forEach(r=>{ if(r.descricao) descr2026[r.placa]=r.descricao; });

  const grid = document.getElementById('fichas-grid');
  grid.innerHTML = DATA.sociedade.map(v=>{
    const vlr   = v.vlr_mercado;
    const descr = descr2026[v.placa] || '';

    const sociosHTML = v.socios.map(s=>`
      <div class="socio-row">
        <div class="socio-nome">${s.nome}</div>
        <div class="socio-bar-wrap">
          <div class="socio-bar" style="width:${s.percentual}%;background:${cor(s.nome)};"></div>
        </div>
        <div class="socio-right">
          <div class="socio-pct" style="color:${cor(s.nome)}">${s.percentual.toFixed(3)}%</div>
          <div class="socio-val">${fmtBR(s.valor)}</div>
        </div>
      </div>`).join('');

    const pctRog = v.socios.find(s=>s.nome==='Rogerio')?.percentual||0;
    const benef  = v.diretriz_rogerio.beneficiarios.map(b=>`${b.nome} (${b.percentual.toFixed(3)}%)`).join(' · ');

    const obsHTML = descr
      ? `<div class="ficha-obs">📋 ${descr}</div>`
      : `<div class="ficha-obs-empty">Sem observação registrada para este veículo.</div>`;

    return `<div class="ficha">
      <div class="ficha-header">
        <div class="ficha-top">
          <div class="ficha-placa">${v.placa}</div>
          <div class="ficha-vlr-tag">Vlr. aprox. ${fmtBR(vlr)}</div>
        </div>
        <div class="ficha-detran">Proprietário conforme registro no Detran em nome de: <span>${v.dono_legal}</span></div>
      </div>
      <div class="ficha-body">
        ${obsHTML}
        <div class="socios-title">Participação Econômica</div>
        <div class="socios-list">${sociosHTML}</div>
        ${pctRog>0?`
        <div class="ficha-diretriz">
          <div class="diretriz-label">📋 Diretrizes de Transferência — Rogério (${pctRog.toFixed(3)}%)</div>
          A participação de Rogério deve ser dividida igualmente entre: ${benef}
        </div>`:''}
        <div class="ficha-diretriz-outros">
          <div class="diretriz-label-outros">Demais Sócios</div>
          ${v.diretriz_outros}
        </div>
      </div>
    </div>`;
  }).join('');

  renderTotalSocios();
}

// ── TOTAL POR SÓCIO ────────────────────────────────
function renderTotalSocios(){
  const totais = {};
  const contagem = {};
  DATA.sociedade.forEach(v=>{
    v.socios.forEach(s=>{
      totais[s.nome]   = (totais[s.nome]||0)   + s.valor;
      contagem[s.nome] = (contagem[s.nome]||0) + 1;
    });
  });
  const lista = Object.entries(totais).sort((a,b)=>b[1]-a[1]);
  const maxVal = lista[0]?.[1]||1;

  const grid = document.getElementById('total-grid');
  grid.innerHTML = lista.map(([nome,val],i)=>`
    <div class="total-card">
      <div class="total-rank">#${i+1} · ${contagem[nome]} veículo(s)</div>
      <div class="total-nome" style="color:${cor(nome)}">${nome}</div>
      <div class="total-val">${fmtBR(val)}</div>
      <div class="total-bar-wrap">
        <div class="total-bar" style="width:${val/maxVal*100}%;background:${cor(nome)};"></div>
      </div>
      <div class="total-detail">Participação estimada total</div>
    </div>`).join('');
}

// ── ROE ────────────────────────────────────────────
let roeCharts={};
function destroyCharts(){ Object.values(roeCharts).forEach(c=>c.destroy()); roeCharts={}; }

function renderROE(){
  destroyCharts();
  const anoSel   = document.getElementById('roe-ano-sel').value;
  const placaSel = document.getElementById('roe-placa-sel').value;

  let rows = [...DATA.historico];
  if(anoSel!=='todos')   rows=rows.filter(r=>r.ano===parseInt(anoSel));
  if(placaSel!=='todas') rows=rows.filter(r=>r.placa===placaSel);

  // Agrupar por placa
  const porPlaca={};
  rows.forEach(r=>{
    if(!porPlaca[r.placa]) porPlaca[r.placa]=[];
    porPlaca[r.placa].push(r);
  });

  const grid=document.getElementById('roe-grid');
  grid.innerHTML='';

  Object.entries(porPlaca).forEach(([placa,dados])=>{
    dados.sort((a,b)=>a.ano-b.ano);
    const anos  = dados.map(r=>r.ano);
    const roes  = dados.map(r=>parseFloat((r.roe*100).toFixed(2)));
    const cores = roes.map(v=>v>=0?'rgba(16,217,160,0.78)':'rgba(240,82,82,0.78)');
    const melhor= dados.reduce((m,r)=>Math.abs(r.roe)>Math.abs(m.roe)?r:m,dados[0]);
    const cid   = 'ch-roe-'+placa.replace(/[^a-z0-9]/gi,'-');

    const tableRows=dados.map(r=>`
      <tr>
        <td>${r.ano}</td>
        <td>${fmtBR(r.vlr_mercado)}</td>
        <td class="${r.lucro>=0?'pos':'neg'}">${fmtBR(r.lucro)}</td>
        <td class="${r.roe>=0?'pos':'neg'}">${(r.roe*100).toFixed(2)}%</td>
      </tr>`).join('');

    const card=document.createElement('div');
    card.className='roe-card';
    card.innerHTML=`
      <div class="roe-card-placa">${placa}</div>
      <div class="roe-card-sub">Melhor ROE: ${melhor.ano} · <span class="${melhor.roe>=0?'pos':'neg'}">${(melhor.roe*100).toFixed(2)}%</span></div>
      <div class="roe-chart-wrap"><canvas id="${cid}"></canvas></div>
      <table class="roe-table">
        <thead><tr><th>Ano</th><th>Vlr.Mercado</th><th>Lucro</th><th>ROE</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>`;
    grid.appendChild(card);

    setTimeout(()=>{
      const ctx=document.getElementById(cid);
      if(!ctx) return;
      roeCharts[cid]=new Chart(ctx,{type:'bar',
        data:{labels:anos,datasets:[{data:roes,backgroundColor:cores,borderWidth:0,borderRadius:4}]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(2)+'%'}}},
          scales:{y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{callback:v=>v+'%',color:'#5a7090',font:{size:10}}},
            x:{grid:{display:false},ticks:{color:'#5a7090',font:{size:10}}}}}});
    },50);
  });

  renderRankingROE(anoSel, porPlaca);
}

function renderRankingROE(anoSel, porPlaca){
  const label = anoSel==='todos'?'Todos os anos':'Ano '+anoSel;
  document.getElementById('rank-title').textContent='Ranking ROE — '+label;

  const ranking=Object.entries(porPlaca).map(([placa,dados])=>{
    const roe = dados.reduce((s,r)=>s+r.roe,0)/dados.length;
    const lucro = dados.reduce((s,r)=>s+r.lucro,0);
    return {placa,roe,lucro};
  }).sort((a,b)=>b.roe-a.roe);

  const maxROE=Math.max(...ranking.map(r=>Math.abs(r.roe)));
  document.getElementById('roe-ranking').innerHTML=ranking.map((r,i)=>`
    <div class="rank-row">
      <div class="rank-num">#${i+1}</div>
      <div class="rank-placa">${r.placa}</div>
      <div class="rank-bar-wrap">
        <div class="rank-bar" style="width:${maxROE>0?Math.abs(r.roe)/maxROE*100:0}%;
          background:${r.roe>=0?'var(--green)':'var(--red)'};"></div>
      </div>
      <div class="rank-pct ${r.roe>=0?'pos':'neg'}">${(r.roe*100).toFixed(2)}%</div>
      <div class="rank-vlr ${r.lucro>=0?'pos':'neg'}">${fmtBR(r.lucro)}</div>
    </div>`).join('');
}

// ── INIT ───────────────────────────────────────────
async function init(){
  try{
    const res=await fetch('patrimonio.json');
    if(!res.ok) throw new Error('patrimonio.json não encontrado');
    DATA=await res.json();

    document.getElementById('top-meta').innerHTML=
      `Ref.: ${DATA.meta.referencia_valores}<br>Versão 1.0`;

    // Popula selects
    const anos=[...new Set(DATA.historico.map(r=>r.ano))].sort();
    const placas=[...new Set(DATA.historico.map(r=>r.placa))].sort();
    const anoSel=document.getElementById('roe-ano-sel');
    anos.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;anoSel.appendChild(o);});
    const anoAtual=new Date().getFullYear();
    if(anos.includes(anoAtual)) anoSel.value=anoAtual;
    const placaSel=document.getElementById('roe-placa-sel');
    placas.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;placaSel.appendChild(o);});

    renderFichas();
    document.getElementById('loading').style.display='none';
  }catch(err){
    document.getElementById('loading').innerHTML=
      `<div style="color:var(--red);font-family:var(--mono);font-size:13px;text-align:center;">
        ⚠ Erro ao carregar patrimonio.json<br>
        <span style="font-size:11px;color:var(--text3);">Coloque patrimonio.json na mesma pasta do index.html</span>
      </div>`;
  }
}
